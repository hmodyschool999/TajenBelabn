  <style>
    :root {
      --bg1: #f0f8ff;
      --bg2: #e0f7ff;
      --accent: #5dade2;
      --glass: rgba(255, 255, 255, 0.7);
      --glass-2: rgba(255, 255, 255, 0.45);
      --text: #0b3050;
    }

    * {
      box-sizing: border-box
    }

    html,
    body {
      height: 100%
    }

    body {
      margin: 0;
      font-family: 'Cairo', system-ui, sans-serif;
      background: linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 100%);
      display: flex;
      flex-direction: column; /* لوضع الفوتر بالاسفل */
      min-height: 100vh; /* ليضمن أن الصفحة بملء الشاشة */
      justify-content: space-between; /* لدفع الفوتر للأسفل */
      color: var(--text);
    }
    
    main {
      flex-grow: 1; /* لجعل المحتوى يملأ المساحة المتاحة */
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px; /* المسافات الجانبية والعلوية */
    }

    .card {
      width: min(720px, 94vw);
      border-radius: 20px;
      padding: 48px 40px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.8));
      box-shadow: 0 10px 30px rgba(27, 47, 77, 0.12);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 24px;
      align-items: center;
      backdrop-filter: blur(6px) saturate(120%);
      position: relative;
      overflow: hidden;
    }

    .logo {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .logo .mark {
      width: 68px;
      height: 68px;
      border-radius: 14px;
      background: conic-gradient(from 180deg at 50% 50%, #aee6ff, #5dade2, #007bff);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: white;
      font-size: 20px;
      box-shadow: 0 6px 18px rgba(0, 123, 255, 0.18)
    }

    .title {
      font-size: 40px;
      font-weight: 700;
      letter-spacing: 2px;
      margin: 0;
    }

    .subtitle {
      font-size: 18px;
      color: #2c5c80;
      margin-top: 6px
    }

    .badge {
      background: linear-gradient(90deg, #aee6ff, #5dade2);
      color: #0b3050;
      padding: 10px 14px;
      border-radius: 12px;
      font-weight: 700;
      box-shadow: 0 6px 18px rgba(0, 123, 255, 0.12);
      transform-origin: center;
      display: inline-block;
      padding: 0.8rem 1.8rem;
      border-radius: 30px;
      font-size: 1.2rem;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-block;
    }

    .badge:hover {
      background: #2980b9;
      transform: scale(1.05);
    }

    .coming {
      text-align: center;
      padding: 28px 36px;
      border-radius: 14px;
      background: var(--glass-2);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.6);
    }

    .coming h1 {
      font-size: 56px;
      margin: 0;
      font-weight: 800;
      color: #0b3050
    }

    .coming p {
      margin: 10px 0 0;
      font-size: 18px;
      color: #2c5c80
    }

    .dots {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 18px
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0;
      transform: translateY(6px);
      animation: pop 1.2s infinite
    }

    .dot:nth-child(2) {
      animation-delay: .15s
    }

    .dot:nth-child(3) {
      animation-delay: .3s
    }

    @keyframes pop {
      0% {
        opacity: 0;
        transform: translateY(8px)
      }

      50% {
        opacity: 1;
        transform: translateY(0)
      }

      100% {
        opacity: 0;
        transform: translateY(-6px)
      }
    }

    /* --- تم تعديل كود السوشيال ميديا (نُقل للفوتر) --- */
    .social-links {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 16px; /* بدل margin-top */
    }

    .social-links a {
      color: var(--text);
      opacity: 0.7;
      transition: opacity 0.3s ease;
      display: flex; 
      align-items: center;
      justify-content: center;
    }

    .social-links a:hover {
      opacity: 1;
    }

    .social-links img {
      width: 24px; /* تم تصغير الحجم قليلا للفوتر */
      height: 24px;
    }
    /* --- نهاية كود السوشيال ميديا --- */

    .shape {
      position: absolute;
      border-radius: 50%;
      filter: blur(40px);
      opacity: 0.35
    }

    .shape.a {
      width: 260px;
      height: 260px;
      background: linear-gradient(135deg, #aee6ff, #5dade2);
      right: -80px;
      top: -70px
    }

    .shape.b {
      width: 180px;
      height: 180px;
      background: linear-gradient(135deg, #d6f1ff, #aee6ff);
      left: -60px;
      bottom: -60px
    }
    
    /* --- كود الفوتر الجديد --- */
    footer {
      text-align: center;
      padding: 24px 32px; /* text-center, py-6, pb-24 */
      border-top: 1px solid rgba(11, 48, 80, 0.15); /* border-t, border-gray-700 */
    }
    
    footer p {
      margin: 0;
    }
    
    footer .made-by {
      color: #2c5c80; /* text-gray-400 */
      font-size: 14px; /* text-sm */
      margin-bottom: 16px; /* لإعطاء مساحة لروابط السوشيال */
    }
    
    footer .copyright {
      color: #2c5c80; /* text-gray-500 */
      font-size: 12px; /* text-xs */
      margin-top: 16px; /* mt-1 (بعد روابط السوشيال) */
    }
    
    .creator-name {
      color: var(--accent);
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .creator-name:hover {
      color: #2980b9; /* لون أزرق أغمق */
      text-shadow: 0 0 8px rgba(41, 128, 185, 0.6); /* تأثير اللمعان */
    }
    /* --- نهاية كود الفوتر --- */


    @media (max-width:560px) {
      .card {
        padding: 28px;
        grid-template-columns: 1fr;
      }

      .coming h1 {
        font-size: 44px
      }

      .title {
        font-size: 28px
      }
      
      main {
        padding: 24px; /* تقليل المسافات الجانبية للموبايل */
      }
      
      footer {
        padding: 24px;
      }
    }
  </style>
